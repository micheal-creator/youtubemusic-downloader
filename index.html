<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube to MP3 Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8 text-gray-800">

  <div class="max-w-4xl mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold text-center mb-6">Download YouTube to mp3</h1>

    <!-- Search Input Bar -->
    <div class="flex gap-2 mb-6">
      <input id="urlInput" type="text" placeholder="Paste YouTube playlist or video URL..." 
             class="flex-1 border rounded-md px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500">
      <button onclick="parseUrl()" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700">
        Search
      </button>
    </div>

    <!-- Loading State -->
    <div id="loader" class="hidden text-center py-4 text-blue-600 font-medium">Fetching track metadata...</div>

    <!-- Track Table -->
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b bg-gray-50 text-gray-600 text-sm">
            <th class="p-3"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th>
            <th class="p-3">Title</th>
            <th class="p-3">Duration</th>
            <th class="p-3 text-right">Status</th>
          </tr>
        </thead>
        <tbody id="trackList" class="divide-y text-sm">
          <tr><td colspan="4" class="p-4 text-center text-gray-400">Enter a URL to display tracks</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Download Selected Button -->
    <div class="mt-6 flex justify-center">
      <button onclick="downloadSelected()" class="bg-blue-600 text-white px-8 py-2.5 rounded-full hover:bg-blue-700 flex items-center gap-2">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M13 8V2H7v6H2l8 8 8-8h-5zM2 18h16v2H2v-2z"/></svg>
        Download All Selected
      </button>
    </div>
  </div>

  <script>
    let tracksData = [];

    function formatTime(seconds) {
      if (!seconds) return "--:--";
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    async function parseUrl() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return alert('Please enter a valid URL');

      document.getElementById('loader').classList.remove('hidden');
      const tbody = document.getElementById('trackList');
      tbody.innerHTML = '';

      try {
        const response = await fetch('/api/parse', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await response.json();
        
        if (data.status === 'success') {
          tracksData = data.tracks;
          renderTracks(tracksData);
        } else {
          alert('Failed to parse link.');
        }
      } catch (err) {
        alert('Error parsing URL: ' + err.message);
      } finally {
        document.getElementById('loader').classList.add('hidden');
      }
    }

    function renderTracks(tracks) {
      const tbody = document.getElementById('trackList');
      tbody.innerHTML = tracks.map((track, i) => `
        <tr class="hover:bg-gray-50">
          <td class="p-3"><input type="checkbox" class="track-checkbox" data-index="${i}"></td>
          <td class="p-3 font-medium text-gray-900">${track.title}</td>
          <td class="p-3 text-gray-500">${formatTime(track.duration)}</td>
          <td class="p-3 text-right">
            <button onclick="downloadSingle('${track.url}', this)" class="text-blue-600 hover:text-blue-800">
              <svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </button>
          </td>
        </tr>
      `).join('');
    }

    function toggleSelectAll(master) {
      document.querySelectorAll('.track-checkbox').forEach(cb => cb.checked = master.checked);
    }

    async function downloadSingle(url, btnElement) {
      btnElement.innerText = "Downloading...";
      btnElement.disabled = true;

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const blob = await res.blob();
        const downloadUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = "track.mp3";
        document.body.appendChild(a);
        a.click();
        a.remove();
        btnElement.innerText = "Done";
      } catch (e) {
        alert("Download failed");
        btnElement.innerText = "Error";
      }
    }

    async function downloadSelected() {
      const checkboxes = document.querySelectorAll('.track-checkbox:checked');
      if (checkboxes.length === 0) return alert('Select at least one track to download.');

      for (let cb of checkboxes) {
        const index = cb.getAttribute('data-index');
        const track = tracksData[index];
        await downloadSingle(track.url, cb.closest('tr').querySelector('button'));
      }
    }
  </script>
</body>
</html>
